{{ define "main" }}
  {{ .Content }}
  <div class="time-list">
    <h2>Recent Posts</h2>
    <ul>
      {{ range first 10 (where site.RegularPages "Section" "posts") }}
      <li>
        <span>{{- partial "date" .Date -}}</span>
        <div><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></div>
      </li>
      {{ end }}
    </ul>
  </div>
  <div class="terminal-nav">
    {{ partial "menu.html" (dict "menuID" "main" "page" .) }}
  </div>
{{ end }}

name: Deploy to Coolify
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify Deploy
        run: |
          curl --request POST \
            "https://coolify.addisons.app/api/v1/deploy?uuid=geqq7fpjie5rvya5bpssossd" \
            --header "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"